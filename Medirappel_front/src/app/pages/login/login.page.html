<ion-content>
  <div class="flex-center">
    <ion-card>
      <ion-card-header>
        <ion-card-title color="primary">Se connecter</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <ion-item>
          <ion-label position="floating">Email</ion-label>
          <ion-input type="email" [(ngModel)]="email" name="email"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Mot de passe</ion-label>
          <ion-input type="password" [(ngModel)]="password" name="password"></ion-input>
        </ion-item>

        <ion-text color="danger" *ngIf="errorMessage">
          <p class="ion-padding-start">{{ errorMessage }}</p>
        </ion-text>

        <ion-button color="dark" fill="clear" size="full">Mot de passe oublié?</ion-button>

        <ion-button color="primary" expand="block" (click)="onSubmit()" [disabled]="isLoading">
          <ion-spinner *ngIf="isLoading" name="dots"></ion-spinner>
          <span *ngIf="!isLoading">Se connecter</span>
        </ion-button>

        <ion-button color="dark" fill="clear" size="full" routerLink="/email">
          Pas encore inscrit?
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
