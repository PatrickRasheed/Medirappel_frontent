<ion-content>
  <div class="flex-center">
    <ion-card>
      <ion-card-header>
        <ion-card-title color="primary">Entrez votre mot de passe</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
          <ion-item>
            <ion-label position="floating">Mot de passe</ion-label>
            <ion-input type="password" formControlName="password"></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="floating">Confirmer mot de passe</ion-label>
            <ion-input type="password" formControlName="confirmPassword"></ion-input>
          </ion-item>

          <ion-text color="danger" *ngIf="confirmPassword?.touched && confirmPassword?.hasError('passwordMismatch')">
            <p class="ion-padding-start">Les mots de passe ne correspondent pas</p>
          </ion-text>

          <ion-text color="danger" *ngIf="errorMessage">
            <p class="ion-padding-start">{{ errorMessage }}</p>
          </ion-text>

          <ion-button color="primary" expand="block" type="submit" [disabled]="isLoading">
            <ion-spinner *ngIf="isLoading" name="dots"></ion-spinner>
            <span *ngIf="!isLoading">Continuer</span>
          </ion-button>
        </form>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
